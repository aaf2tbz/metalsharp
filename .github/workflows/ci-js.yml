name: JS/TS CI

on:
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/tsconfig.json'
      - '.github/workflows/ci-js.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/tsconfig.json'
      - '.github/workflows/ci-js.yml'

jobs:
  check:
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Biome lint
        run: npx @biomejs/biome ci src/

      - name: Prettier check
        run: npx prettier --check 'src/**/*.{ts,js,html,css,json}'
