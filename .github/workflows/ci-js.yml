name: CI JS

on:
  push:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/tsconfig.json'
      - 'app/biome.json'
  pull_request:
    branches: [main]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/tsconfig.json'
      - 'app/biome.json'

permissions:
  contents: read

jobs:
  check-js:
    name: JS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: cd app && npm install

      - name: TypeScript
        run: cd app && npx tsc --noEmit

      - name: Biome
        run: cd app && npx @biomejs/biome ci src/

      - name: Prettier
        run: cd app && npx prettier --check 'src/**/*.{ts,js,html,css,json}'

      - name: Shell check
        run: bash -n app/updater/update.sh
