name: Publish Linux Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v. Defaults to the selected release tag.
        required: false
      release_tag:
        description: GitHub release tag containing the Linux package assets. Defaults to the latest release.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Linux artifacts to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ORAS
        env:
          ORAS_VERSION: 1.3.2
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" -o oras.tar.gz
          tar -xzf oras.tar.gz oras
          sudo install -m 0755 oras /usr/local/bin/oras
          oras version

      - name: Resolve release inputs
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          release_tag="${INPUT_RELEASE_TAG}"
          if [ -z "$release_tag" ]; then
            release_tag="$(gh release view --json tagName --jq .tagName)"
          fi
          version="${INPUT_VERSION}"
          if [ -z "$version" ]; then
            version="${release_tag#v}"
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release dist/electron dist/packages
          gh release download "${RELEASE_TAG}" \
            --pattern 'metalsharp_*_amd64.deb' \
            --pattern 'latest-linux.yml' \
            --pattern 'metalsharp_linux_runtime*' \
            --dir dist/release
          mv dist/release/metalsharp_*_amd64.deb dist/electron/
          mv dist/release/latest-linux.yml dist/electron/
          mv dist/release/metalsharp_linux_runtime* dist/packages/

      - name: Publish OCI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          METALSHARP_VERSION: ${{ steps.release.outputs.version }}
          METALSHARP_PACKAGE_TAGS: ${{ steps.release.outputs.version }} ${{ steps.release.outputs.release_tag }} latest
        run: |
          tools/linux/publish-oci-packages.sh

      - name: Verify package tags
        env:
          VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          OWNER="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          for image in "metalsharp-linux-runtime" "metalsharp-linux-deb"; do
            tags="$(oras repo tags "ghcr.io/${OWNER}/${image}")"
            printf '%s\n' "$tags" | grep -Fx "$VERSION"
            printf '%s\n' "$tags" | grep -Fx "$RELEASE_TAG"
            printf '%s\n' "$tags" | grep -Fx latest
          done
