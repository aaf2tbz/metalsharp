name: Publish Linux Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading v
        required: true
        default: 0.33.21
      release_tag:
        description: GitHub release tag containing the Linux package assets
        required: true
        default: v0.33.21

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Linux artifacts to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ORAS
        env:
          ORAS_VERSION: 1.3.2
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" -o oras.tar.gz
          tar -xzf oras.tar.gz oras
          sudo install -m 0755 oras /usr/local/bin/oras
          oras version

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          mkdir -p dist/release dist/electron dist/packages
          gh release download "${RELEASE_TAG}" \
            --pattern 'metalsharp_*_amd64.deb' \
            --pattern 'latest-linux.yml' \
            --pattern 'metalsharp_linux_runtime*' \
            --dir dist/release
          mv dist/release/metalsharp_*_amd64.deb dist/electron/
          mv dist/release/latest-linux.yml dist/electron/
          mv dist/release/metalsharp_linux_runtime* dist/packages/

      - name: Publish OCI artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          METALSHARP_VERSION: ${{ inputs.version }}
          METALSHARP_PACKAGE_TAGS: ${{ inputs.version }} ${{ inputs.release_tag }} latest
        run: |
          tools/linux/publish-oci-packages.sh

      - name: Verify package tags
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          oras repo tags "ghcr.io/${OWNER}/metalsharp-linux-runtime" | grep -E "^(${VERSION}|${RELEASE_TAG}|latest)$"
          oras repo tags "ghcr.io/${OWNER}/metalsharp-linux-deb" | grep -E "^(${VERSION}|${RELEASE_TAG}|latest)$"
