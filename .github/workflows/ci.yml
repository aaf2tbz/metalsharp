name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  actions: read

jobs:
  check-rust:
    name: Rust
    runs-on: macos-14
    defaults:
      run:
        working-directory: app/src-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-rust

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Audit
        run: |
          cargo install cargo-audit
          cargo audit

  check-cpp:
    name: C++ / Metal
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: brew install clang-format

      - name: Format check
        run: find src include tests tools -name '*.cpp' -o -name '*.mm' -o -name '*.h' -o -name '*.c' | xargs clang-format --dry-run --Werror

      - name: Configure
        run: mkdir build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Metal adapter check
        run: |
          echo "::group::Metal Device Validation"
          ./build/tests/test_metal_device
          echo "::endgroup::"

      - name: Shader translation tests
        run: |
          echo "::group::DXBC Parser"
          ./build/tests/test_dxbc
          echo "::endgroup::"
          echo "::group::Format Translation"
          ./build/tests/test_format_translation
          echo "::endgroup::"
          echo "::group::Argument Buffers"
          ./build/tests/test_phase17
          echo "::endgroup::"

      - name: D3D11 Metal tests
        run: |
          echo "::group::D3D11 Device"
          ./build/tests/test_d3d11_device
          echo "::endgroup::"
          echo "::group::Deferred Context"
          ./build/tests/test_deferred_context
          echo "::endgroup::"

      - name: D3D12 Metal tests
        run: |
          echo "::group::D3D12 Device"
          ./build/tests/test_d3d12
          echo "::endgroup::"
          echo "::group::Phase 18"
          ./build/tests/test_phase18
          echo "::endgroup::"
          echo "::group::Phase 19"
          ./build/tests/test_phase19
          echo "::endgroup::"

      - name: Audio & Input backend tests
        run: |
          echo "::group::XAudio2"
          ./build/tests/test_audio
          echo "::endgroup::"
          echo "::group::XInput"
          ./build/tests/test_input
          echo "::endgroup::"

      - name: Runtime tests
        run: |
          echo "::group::Runtime"
          ./build/tests/test_runtime
          echo "::endgroup::"
          echo "::group::Phase 20"
          ./build/tests/test_phase20
          echo "::endgroup::"
          echo "::group::Phase 21"
          ./build/tests/test_phase21
          echo "::endgroup::"
          echo "::group::Phase 22"
          ./build/tests/test_phase22
          echo "::endgroup::"
          echo "::group::Phase 23"
          ./build/tests/test_phase23
          echo "::endgroup::"
          echo "::group::Phase 24"
          ./build/tests/test_phase24
          echo "::endgroup::"

      - name: Full ctest suite
        run: cd build && ctest --output-on-failure

  check-js:
    name: JS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: cd app && npm install

      - name: TypeScript
        run: cd app && npx tsc --noEmit

      - name: Biome
        run: cd app && npx @biomejs/biome ci src/

      - name: Prettier
        run: cd app && npx prettier --check 'src/**/*.{ts,js,html,css,json}'

      - name: Shell check
        run: bash -n app/updater/update.sh

  build:
    name: Build DMG
    needs: [check-rust, check-cpp, check-js]
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Install Electron deps
        run: cd app && npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Build TypeScript
        run: cd app && npm run build

      - name: Download bundles for DMG
        run: |
          mkdir -p app/bundles
          gh release download bundles \
            --repo ${{ github.repository }} \
            --pattern "*.tar.zst" \
            --pattern "*.exe" \
            --pattern "*.c" \
            --dir app/bundles \
            --clobber || echo "No bundles found — building without"
          ls -lh app/bundles/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package DMG
        run: cd app && npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-dmg
          path: dist/electron/*.dmg

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: MetalSharp-dmg
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
