name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust toolchain
        run: rustup show && cargo --version

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-rust

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Install Electron deps
        run: cd app && npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Build TypeScript
        run: cd app && npm run build

      - name: Download bundles for DMG
        run: |
          mkdir -p app/bundles
          gh release download bundles \
            --repo ${{ github.repository }} \
            --pattern "*.tar.zst" \
            --pattern "*.exe" \
            --pattern "*.c" \
            --dir app/bundles \
            --clobber || echo "No bundles found — building without"
          ls -lh app/bundles/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package DMG
        run: cd app && npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-dmg
          path: dist/electron/*.dmg

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: MetalSharp-dmg
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
