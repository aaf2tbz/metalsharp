name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Build C++ engine
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          mkdir -p ../app/native
          cp libd3d11.dylib libd3d12.dylib libdxgi.dylib libxaudio2_9.dylib libxinput1_4.dylib ../app/native/ 2>/dev/null || true
          cp metalsharp metalsharp_launcher MetalSharpMigrator ../app/native/ 2>/dev/null || true

      - name: Install Electron deps
        run: cd app && npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Build TypeScript
        run: cd app && npm run build

      - name: Download bundles for DMG
        run: |
          tools/dmg/create-bundles.sh
          for required in \
            metalsharp_bundle.tar.zst \
            metalsharp_bundle2.tar.zst \
            SteamSetup.exe \
            steamwebhelper.exe \
            steamwebhelper-wrapper.c
          do
            test -s "app/bundles/$required"
          done
          ls -lh app/bundles/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adhoc-sign backend binary
        run: |
          codesign --force --sign - app/src-rust/target/release/metalsharp-backend || true
          for f in app/native/*.dylib app/native/metalsharp app/native/metalsharp_launcher; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done

      - name: Package DMG
        run: cd app && npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-dmg
          path: dist/electron/*.dmg

  build-linux:
    name: Build DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Build Debian package
        run: npm run deb:docker
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux package tools
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Create Linux runtime package tarballs
        run: tools/linux/create-release-tarballs.sh

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-deb
          path: |
            dist/electron/*.deb
            dist/electron/latest-linux.yml
            dist/packages/metalsharp_linux_runtime*.tar.zst
            dist/packages/metalsharp_linux_runtime.sha256

      - name: Install ORAS
        env:
          ORAS_VERSION: 1.3.2
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz" -o oras.tar.gz
          tar -xzf oras.tar.gz oras
          sudo install -m 0755 oras /usr/local/bin/oras
          oras version

      - name: Publish Linux OCI packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/.*"version": "\(.*\)".*/\1/p' app/package.json | head -1)"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            export METALSHARP_PACKAGE_TAGS="${VERSION} ${GITHUB_REF_NAME} latest"
          else
            export METALSHARP_PACKAGE_TAGS="main"
          fi
          export METALSHARP_VERSION="$VERSION"
          tools/linux/publish-oci-packages.sh

  release:
    name: Release
    needs: [build, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: MetalSharp-*
          path: release/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
