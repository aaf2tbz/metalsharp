name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Build C++ engine
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          mkdir -p ../app/native
          cp libd3d11.dylib libd3d12.dylib libdxgi.dylib libxaudio2_9.dylib libxinput1_4.dylib ../app/native/ 2>/dev/null || true
          cp metalsharp metalsharp_launcher MetalSharpMigrator ../app/native/ 2>/dev/null || true
          cd ..
          METALSHARP_BUILD_DIR="$PWD/build" tools/package/create-host-runtime.sh

      - name: Install Electron deps
        run: cd app && npm ci

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tools/release/set-version.sh "$VERSION"

      - name: Build TypeScript
        run: cd app && npm run build

      - name: Download bundles for DMG
        run: |
          tools/dmg/create-bundles.sh
          tools/dmg/stage-release-bundles.sh app/bundles dist/staged-bundles
          for required in \
            metalsharp-electron.tar.zst \
            metalsharp-graphics-dll.tar.zst \
            metalsharp-runtime.tar.zst \
            metalsharp-assets.tar.zst \
            metalsharp-scripts-tools.tar.zst \
            metalsharp-steam.tar.zst \
            metalsharp-d3d12-developer-sdk.tar.zst
          do
            test -s "app/bundles/$required"
          done
          ls -lh app/bundles/
          find dist/staged-bundles -type d | sort | sed -n '1,120p'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Adhoc-sign backend binary
        run: |
          codesign --force --sign - app/src-rust/target/release/metalsharp-backend || true
          for f in app/native/*.dylib app/native/metalsharp app/native/metalsharp_launcher; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find app/native/host -type f \( -name '*.dylib' -o -name '*.so' \) -print0 | xargs -0 -I{} codesign --force --sign - "{}" 2>/dev/null || true

      - name: Package DMG
        run: cd app && npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload split dependency bundles
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload bundles \
            app/bundles/metalsharp-electron.tar.zst \
            app/bundles/metalsharp-graphics-dll.tar.zst \
            app/bundles/metalsharp-runtime.tar.zst \
            app/bundles/metalsharp-assets.tar.zst \
            app/bundles/metalsharp-scripts-tools.tar.zst \
            app/bundles/metalsharp-steam.tar.zst \
            app/bundles/metalsharp-d3d12-developer-sdk.tar.zst \
            dist/bundles/metalsharp-bundle-manifest.tsv \
            --repo aaf2tbz/metalsharp --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-dmg
          path: |
            dist/electron/*.dmg
            dist/bundles/metalsharp-bundle-manifest.tsv

  release:
    name: Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: MetalSharp-dmg
          path: release/

      - name: Flatten and verify release payload
        run: |
          set -euo pipefail
          find release -type f -print | sort
          mkdir -p release-flat
          find release -type f -name '*.dmg' -exec cp {} release-flat/ \;
          find release -type f -name 'metalsharp-bundle-manifest.tsv' -exec cp {} release-flat/ \;
          test "$(find release-flat -type f -name '*.dmg' | wc -l | tr -d ' ')" -ge 1
          test -s release-flat/metalsharp-bundle-manifest.tsv
          find release-flat -type f -print | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-flat/*.dmg
            release-flat/metalsharp-bundle-manifest.tsv
          generate_release_notes: true
