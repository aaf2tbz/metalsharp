name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure Release
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.ncpu)

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp build/d3d11.dylib dist/
          cp build/d3d12.dylib dist/
          cp build/dxgi.dylib dist/
          cp build/xaudio2_9.dylib dist/
          cp build/xinput1_4.dylib dist/
          cp build/metalsharp_launcher dist/

      - uses: actions/upload-artifact@v4
        with:
          name: metalsharp-macos-arm64
          path: dist/
