name: CI

on:
  push:
    branches: [main]

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  shell:
    name: Shell CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck maintained scripts
        run: tools/ci/shellcheck.sh

  metal:
    name: Metal CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-metal -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-metal --parallel $(sysctl -n hw.ncpu)

      - name: Metal tests
        run: ctest --test-dir build-metal --output-on-failure -R '^(metal_device|dxbc|format_translation|phase17)$'

  vue:
    name: Vue CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome
        run: npx @biomejs/biome ci src/renderer

      - name: Prettier
        run: npx prettier --check 'src/renderer/**/*.{ts,js,html,css,json}'

      - name: Build renderer
        run: npx vite build

  rust:
    name: Rust CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app/src-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-rust

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Sign with EndpointSecurity entitlements
        run: |
          codesign --force --sign - \
            --entitlements entitlements.plist \
            target/release/metalsharp-backend

      - name: Test
        run: cargo test

  electron:
    name: Electron CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Biome
        run: npx @biomejs/biome ci src/main src/shared

      - name: Prettier
        run: npx prettier --check 'src/main/**/*.{ts,js,json}' 'src/shared/**/*.{ts,js,json}'

  native:
    name: C/C++/Obj-C CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: brew install clang-format zstd

      - name: D3D12 Metal SDK contracts
        run: |
          prepare_d3d12_mini_probe_runtime() {
            mkdir -p app/bundles "$HOME/.metalsharp/runtime/wine/lib/dxmt"
            for asset in metalsharp-runtime.tar.zst metalsharp-graphics-dll.tar.zst; do
              if [ ! -s "app/bundles/$asset" ]; then
                curl -fL -o "app/bundles/$asset" "https://github.com/aaf2tbz/metalsharp/releases/download/bundles/$asset"
              fi
            done

            tmp_bundle="$(mktemp -d)"
            tar --use-compress-program=unzstd -xf app/bundles/metalsharp-runtime.tar.zst -C "$tmp_bundle"
            wine_source="$tmp_bundle/runtime/wine"
            mkdir -p "$HOME/.metalsharp/runtime/wine"
            cp -R "$wine_source"/. "$HOME/.metalsharp/runtime/wine/"

            tmp_dxmt="$(mktemp -d)"
            tar --use-compress-program=unzstd -xf app/bundles/metalsharp-graphics-dll.tar.zst -C "$tmp_dxmt"
            mkdir -p "$HOME/.metalsharp/runtime/wine/lib/dxmt/x86_64-unix"
            mkdir -p "$HOME/.metalsharp/runtime/wine/lib/dxmt/x86_64-windows"
            mkdir -p "$HOME/.metalsharp/runtime/wine/lib/wine/x86_64-unix"
            cp -R "$tmp_dxmt/Graphics/dll/dxmt/x86_64-unix"/. "$HOME/.metalsharp/runtime/wine/lib/dxmt/x86_64-unix/"
            cp -R "$tmp_dxmt/Graphics/dll/dxmt/x86_64-windows"/. "$HOME/.metalsharp/runtime/wine/lib/dxmt/x86_64-windows/"
            for unix_asset in winemetal.so libc++.1.dylib libc++abi.1.dylib libunwind.1.dylib; do
              cp "$HOME/.metalsharp/runtime/wine/lib/dxmt/x86_64-unix/$unix_asset" "$HOME/.metalsharp/runtime/wine/lib/wine/x86_64-unix/$unix_asset"
            done
          }

          python3 tools/d3d12-metal-sdk/scripts/validate-contracts.py
          python3 tools/d3d12-metal-sdk/scripts/validate-probe-matrix.py
          if git diff-tree --no-commit-id --name-only -r "$GITHUB_SHA" > /tmp/metalsharp-main-files.txt \
            && grep -E '^(vendor/dxmt/src/d3d12|vendor/dxmt/src/airconv|vendor/dxmt/src/winemetal|tools/d3d12-metal-sdk)/' /tmp/metalsharp-main-files.txt >/dev/null; then
            echo "D3D12 Metal SDK touch detected; running required mini-probe gate."
            prepare_d3d12_mini_probe_runtime
            tools/d3d12-metal-sdk/scripts/run-probes.sh --profile metalsharp --mini-only
          fi

      - name: Format check
        run: find src include tests tools \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.mm' \) -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Configure
        run: cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-native --parallel $(sysctl -n hw.ncpu)

      - name: Runtime tests
        run: ctest --test-dir build-native --output-on-failure -E '^(metal_device|dxbc|format_translation|phase17)$'

      - name: Host ABI package smoke
        run: |
          METALSHARP_BUILD_DIR="$PWD/build-native" tools/package/create-host-runtime.sh
          test -s app/native/host/HostRuntimeABI.h
          test -s app/native/host/manifest.json
          test -s app/native/host/libmetalsharp_host_runtime.dylib

  dmg-workflow:
    name: DMG Workflow CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify DMG workflow contract
        run: python3 tools/ci/verify-dmg-workflow.py
