# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#

name: Main CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  rust:
    name: CodeQL Rust
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          config-file: .github/codeql/codeql-rust.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:rust'

  vue:
    name: CodeQL Vue
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
        working-directory: app

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: .github/codeql/codeql-vue.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:vue'

  js:
    name: CodeQL JS
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
        working-directory: app

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          config-file: .github/codeql/codeql-js.yml

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript'

  cpp:
    name: CodeQL C++
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          config-file: .github/codeql/codeql-cpp.yml

      - name: Build native code
        run: cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=Release && cmake --build build-codeql --parallel $(sysctl -n hw.ncpu)

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:c-cpp'
