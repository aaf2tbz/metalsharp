name: Nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Package
        run: |
          mkdir -p dist
          cp build/metalsharp dist/
          cp build/metalsharp_launcher dist/
          cp build/*.dylib dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: metalsharp-nightly-arm64-${{ github.sha }}
          path: dist/
          retention-days: 30

  nightly-x86_64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build -- -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      - name: Package
        run: |
          mkdir -p dist
          cp build/metalsharp dist/
          cp build/metalsharp_launcher dist/
          cp build/*.dylib dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: metalsharp-nightly-x86_64-${{ github.sha }}
          path: dist/
          retention-days: 30
