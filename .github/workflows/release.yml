name: Release CI

on:
  push:
    tags: ['v*']

concurrency:
  group: release-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read
  packages: write

jobs:
  developer-sdk:
    name: Publish Developer SDK Bundle
    runs-on: macos-14
    concurrency:
      group: metalsharp-developer-sdk-bundles
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Build host runtime ABI
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build . --target metalsharp_host_runtime --parallel $(sysctl -n hw.ncpu)
          cd ..
          METALSHARP_BUILD_DIR="$PWD/build" tools/package/create-host-runtime.sh

      - name: Download current split bundles
        run: tools/dmg/create-bundles.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release Wine runtime for M12 build
        run: |
          mkdir -p dist/release-runtime
          tar --use-compress-program=unzstd -xf app/bundles/metalsharp-runtime.tar.zst -C dist/release-runtime
          test -x dist/release-runtime/runtime/wine/bin/winebuild

      - name: Install DXMT build tools
        run: |
          brew list meson >/dev/null 2>&1 || brew install meson
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list mingw-w64 >/dev/null 2>&1 || brew install mingw-w64
          meson --version
          ninja --version
          x86_64-w64-mingw32-gcc --version
          x86_64-w64-mingw32-g++ --version

      - name: Build staged M12 DXMT runtime
        run: |
          tools/d3d12-metal-sdk/scripts/prepare-dxmt-x86-llvm15.sh
          python3 tools/d3d12-metal-sdk/scripts/stage-dxmt-runtime.py \
            --build-dir vendor/dxmt/build-metalsharp-x64 \
            --runtime-dir dist/dxmt_m12 \
            --profile release-ci-m12
        env:
          METALSHARP_WINE_ROOT: ${{ github.workspace }}/dist/release-runtime/runtime/wine
          METALSHARP_X86_LLVM_ROOT: ${{ runner.temp }}/metalsharp-toolchains

      - name: Repair split bundles with staged M12 runtime
        run: tools/dmg/create-bundles.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          METALSHARP_DXMT_M12_ROOT: ${{ github.workspace }}/dist/dxmt_m12

      - name: Build self-contained developer SDK
        run: |
          tools/bundles/create-developer-sdk.py \
            --bundle-dir app/bundles \
            --out-dir dist/developer-sdk \
            --manifest dist/bundles/metalsharp-bundle-manifest.tsv
          tools/bundles/verify-developer-sdk.sh \
            dist/developer-sdk/metalsharp-d3d12-developer-sdk.tar.zst

      - name: Setup ORAS
        uses: oras-project/setup-oras@v2

      - name: Publish developer SDK package
        run: |
          set -euo pipefail
          OWNER="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          PACKAGE="ghcr.io/$OWNER/metalsharp-d3d12-developer-sdk"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="dist/developer-sdk/metalsharp-d3d12-developer-sdk.tar.zst"
          SHA="$(shasum -a 256 "$ARCHIVE" | awk '{print $1}')"
          echo "$GH_TOKEN" | oras login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          oras push "$PACKAGE:$VERSION" \
            "$ARCHIVE:application/vnd.metalsharp.d3d12-developer-sdk.layer.v1.tar+zstd" \
            --artifact-type application/vnd.metalsharp.d3d12-developer-sdk.v1 \
            --annotation "org.opencontainers.image.title=MetalSharp D3D12 Developer SDK" \
            --annotation "org.opencontainers.image.description=Self-contained MetalSharp D3D12 developer SDK with staged Wine runtime and DXMT files" \
            --annotation "org.opencontainers.image.version=$VERSION" \
            --annotation "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --annotation "org.opencontainers.image.revision=$GITHUB_SHA" \
            --annotation "org.opencontainers.image.digest.sha256=$SHA"
          oras tag "$PACKAGE:$VERSION" latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify repaired release bundle layout
        run: |
          set -euo pipefail
          tar --use-compress-program=unzstd -tf dist/bundles/metalsharp-graphics-dll.tar.zst \
            | grep -E '^Graphics/dll/dxmt-m12/x86_64-unix/winemetal\.so$'
          tar --use-compress-program=unzstd -tf dist/bundles/metalsharp-graphics-dll.tar.zst \
            | grep -E '^Graphics/dll/dxmt-m12/x86_64-windows/d3d12\.dll$'
          ! tar --use-compress-program=unzstd -tf dist/bundles/metalsharp-assets.tar.zst \
            | grep -E '^assets/eac-toggle/'

      - name: Publish release bundles
        run: |
          tools/bundles/publish-release-assets.sh bundles \
            dist/bundles/metalsharp-runtime.tar.zst \
            dist/bundles/metalsharp-graphics-dll.tar.zst \
            dist/bundles/metalsharp-assets.tar.zst \
            dist/developer-sdk/metalsharp-d3d12-developer-sdk.tar.zst \
            dist/developer-sdk/metalsharp-bundle-manifest.tsv
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build DMG
    needs: [developer-sdk]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust backend
        run: cd app/src-rust && cargo build --release

      - name: Build C++ engine
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          mkdir -p ../app/native
          cp libd3d11.dylib libd3d12.dylib libdxgi.dylib libxaudio2_9.dylib libxinput1_4.dylib ../app/native/ 2>/dev/null || true
          cp metalsharp metalsharp_launcher MetalSharpMigrator ../app/native/ 2>/dev/null || true
          cd ..
          METALSHARP_BUILD_DIR="$PWD/build" tools/package/create-host-runtime.sh

      - name: Install Electron deps
        run: cd app && npm ci

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tools/release/set-version.sh "$VERSION"

      - name: Build TypeScript
        run: cd app && npm run build

      - name: Download current split bundles
        run: tools/dmg/create-bundles.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release Wine runtime for M12 build
        run: |
          mkdir -p dist/release-runtime
          tar --use-compress-program=unzstd -xf app/bundles/metalsharp-runtime.tar.zst -C dist/release-runtime
          test -x dist/release-runtime/runtime/wine/bin/winebuild

      - name: Install DXMT build tools
        run: |
          brew list meson >/dev/null 2>&1 || brew install meson
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list mingw-w64 >/dev/null 2>&1 || brew install mingw-w64
          meson --version
          ninja --version
          x86_64-w64-mingw32-gcc --version
          x86_64-w64-mingw32-g++ --version

      - name: Build staged M12 DXMT runtime
        run: |
          tools/d3d12-metal-sdk/scripts/prepare-dxmt-x86-llvm15.sh
          python3 tools/d3d12-metal-sdk/scripts/stage-dxmt-runtime.py \
            --build-dir vendor/dxmt/build-metalsharp-x64 \
            --runtime-dir dist/dxmt_m12 \
            --profile release-ci-m12
        env:
          METALSHARP_WINE_ROOT: ${{ github.workspace }}/dist/release-runtime/runtime/wine
          METALSHARP_X86_LLVM_ROOT: ${{ runner.temp }}/metalsharp-toolchains

      - name: Download bundles for DMG
        run: |
          METALSHARP_DXMT_M12_ROOT="$PWD/dist/dxmt_m12" tools/dmg/create-bundles.sh
          tools/dmg/stage-release-bundles.sh app/bundles dist/staged-bundles
          for required in \
            metalsharp-electron.tar.zst \
            metalsharp-graphics-dll.tar.zst \
            metalsharp-runtime.tar.zst \
            metalsharp-assets.tar.zst \
            metalsharp-scripts-tools.tar.zst \
            metalsharp-steam.tar.zst \
            metalsharp-d3d12-developer-sdk.tar.zst
          do
            test -s "app/bundles/$required"
          done
          ls -lh app/bundles/
          find dist/staged-bundles -type d | sort | sed -n '1,120p'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Apple signing credentials
        id: apple-signing
        run: tools/dmg/check-apple-signing-readiness.sh
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Prepare Apple Developer ID signing
        if: steps.apple-signing.outputs.ready == 'true'
        run: tools/dmg/prepare-apple-signing.sh
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Adhoc-sign native binaries for unsigned local packaging
        run: |
          if [ -n "${CSC_KEYCHAIN:-}" ]; then
            echo "Developer ID signing enabled; skipping ad-hoc pre-sign."
            exit 0
          fi
          codesign --force --sign - app/src-rust/target/release/metalsharp-backend || true
          for f in app/native/*.dylib app/native/metalsharp app/native/metalsharp_launcher; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          find app/native/host -type f \( -name '*.dylib' -o -name '*.so' \) -print0 | xargs -0 -I{} codesign --force --sign - "{}" 2>/dev/null || true

      - name: Package DMG
        run: cd app && npx electron-builder --mac dmg --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ steps.apple-signing.outputs.ready == 'true' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.apple-signing.outputs.ready == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.apple-signing.outputs.ready == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_API_KEY_ID: ${{ steps.apple-signing.outputs.ready == 'true' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ steps.apple-signing.outputs.ready == 'true' && secrets.APPLE_API_ISSUER || '' }}

      - name: Verify DMG runtime assets
        run: tools/dmg/verify-dmg-runtime-assets.sh dist/electron/MetalSharp-*-arm64.dmg

      - name: Verify Apple notarization
        if: steps.apple-signing.outputs.ready == 'true'
        run: |
          set -euo pipefail
          test "${{ steps.apple-signing.outputs.ready }}" = "true"
          tools/dmg/verify-notarization.sh dist/electron/mac-arm64/MetalSharp.app
          tools/dmg/verify-notarization.sh dist/electron/MetalSharp-*-arm64.dmg

      - name: Mark signed DMG
        if: steps.apple-signing.outputs.ready == 'true'
        run: |
          printf '%s\n' \
            "MetalSharp DMG was packaged with Apple Developer ID signing and notarization." \
            > dist/electron/DMG-SIGNING.txt

      - name: Mark unsigned DMG
        if: steps.apple-signing.outputs.ready != 'true'
        run: |
          printf '%s\n' \
            "MetalSharp DMG was packaged without Apple Developer ID signing because release secrets are not configured." \
            "Configure MACOS_CERTIFICATE_P12, MACOS_CERTIFICATE_PASSWORD, and one notarization credential set to produce a notarized DMG." \
            > dist/electron/DMG-SIGNING.txt

      - uses: actions/upload-artifact@v4
        with:
          name: MetalSharp-dmg
          path: |
            dist/electron/*.dmg
            dist/electron/DMG-SIGNING.txt
            dist/bundles/metalsharp-bundle-manifest.tsv

  release:
    name: Release
    needs: [build]
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: MetalSharp-dmg
          path: release/

      - name: Flatten and verify release payload
        run: |
          set -euo pipefail
          find release -type f -print | sort
          mkdir -p release-flat
          find release -type f -name '*.dmg' -exec cp {} release-flat/ \;
          find release -type f -name 'DMG-SIGNING.txt' -exec cp {} release-flat/ \;
          find release -type f -name 'metalsharp-bundle-manifest.tsv' -exec cp {} release-flat/ \;
          test "$(find release-flat -type f -name '*.dmg' | wc -l | tr -d ' ')" -ge 1
          test -s release-flat/DMG-SIGNING.txt
          test -s release-flat/metalsharp-bundle-manifest.tsv
          find release-flat -type f -print | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-flat/*.dmg
            release-flat/DMG-SIGNING.txt
            release-flat/metalsharp-bundle-manifest.tsv
          generate_release_notes: true
