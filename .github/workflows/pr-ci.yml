name: PR CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  metal:
    name: Metal CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-metal -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-metal --parallel $(sysctl -n hw.ncpu)

      - name: Metal tests
        run: ctest --test-dir build-metal --output-on-failure -R '^(metal_device|dxbc|format_translation|phase17)$'

  vue:
    name: Vue CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome
        run: npx @biomejs/biome ci src/renderer

      - name: Prettier
        run: npx prettier --check 'src/renderer/**/*.{ts,js,html,css,json}'

      - name: Build renderer
        run: npx vite build

  rust:
    name: Rust CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app/src-rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-rust

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  electron:
    name: Electron CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Biome
        run: npx @biomejs/biome ci src/main src/shared

      - name: Prettier
        run: npx prettier --check 'src/main/**/*.{ts,js,json}' 'src/shared/**/*.{ts,js,json}'

      - name: Shell check
        run: bash -n updater/update.sh

  wine119-evidence:
    name: Wine 11.9 Evidence CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install evidence tools
        run: brew install ripgrep

      - name: Script syntax
        run: |
          bash -n \
            scripts/fetch-wine119-release-assets.sh \
            scripts/runtime-manifest.sh \
            scripts/compare-runtime-manifests.sh \
            scripts/prepare-wine119-candidate.sh \
            scripts/prepare-wine119-parity-candidates.sh \
            scripts/install-wine119-parity-home.sh \
            scripts/probe-wine119-parity-backend.sh \
            scripts/capture-steam-game-proof.sh \
            scripts/run-wine119-live-control-suite.sh \
            scripts/verify-wine119-live-control-suite.sh \
            scripts/audit-wine119-readiness.sh \
            scripts/audit-mscompatdb-hook-surface.sh \
            scripts/audit-i386-winemetal-provenance.sh \
            scripts/preflight-i386-winemetal-build.sh \
            scripts/audit-wine119-objective-completion.sh \
            scripts/test-wine119-live-suite-guards.sh \
            scripts/test-wine119-objective-audit-guards.sh \
            scripts/test-wine119-live-verifier-fixtures.sh

      - name: Non-live evidence guard fixtures
        run: |
          scripts/test-wine119-live-suite-guards.sh
          scripts/test-wine119-objective-audit-guards.sh
          scripts/test-wine119-live-verifier-fixtures.sh

  native:
    name: C/C++/Obj-C CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: brew install clang-format

      - name: Format check
        run: find src include tests tools \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.mm' \) -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Configure
        run: cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-native --parallel $(sysctl -n hw.ncpu)

      - name: Runtime tests
        run: ctest --test-dir build-native --output-on-failure -E '^(metal_device|dxbc|format_translation|phase17)$'

      - name: Host ABI package smoke
        run: |
          METALSHARP_BUILD_DIR="$PWD/build-native" tools/package/create-host-runtime.sh
          test -s app/native/host/HostRuntimeABI.h
          test -s app/native/host/manifest.json
          test -s app/native/host/libmetalsharp_host_runtime.dylib

  docker-smoke:
    name: Docker Package Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Linux package builder image
        run: docker build --platform linux/amd64 -f tools/linux/Dockerfile.deb -t metalsharp-deb-builder:ci .

      - name: Smoke Linux package scripts in Docker
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -e HOME=/tmp \
            -e METALSHARP_PACKAGE_OUT=/work/dist/packages \
            -e GITHUB_REPOSITORY=aaf2tbz/metalsharp \
            -e GITHUB_REPOSITORY_OWNER=aaf2tbz \
            -v "$PWD:/work" \
            -w /work \
            metalsharp-deb-builder:ci \
            bash -lc 'source /usr/local/cargo/env && bash -n tools/linux/*.sh && tools/linux/create-release-tarballs.sh && VERSION="$(node -p "require('\''./app/package.json'\'').version")" && mkdir -p dist/electron && printf "deb" > "dist/electron/metalsharp_${VERSION}_amd64.deb" && printf "version: %s\n" "$VERSION" > dist/electron/latest-linux.yml && test -s dist/packages/metalsharp_linux_runtime.tar.zst && test -s dist/packages/metalsharp_linux_runtime2.tar.zst && test -s dist/packages/metalsharp_linux_runtime.sha256 && METALSHARP_VERSION="$VERSION" METALSHARP_OCI_DRY_RUN=1 tools/linux/publish-oci-packages.sh | tee /tmp/oci-paths.txt && ! grep -q "^/" /tmp/oci-paths.txt'
