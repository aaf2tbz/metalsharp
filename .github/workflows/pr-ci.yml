name: PR CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell:
    name: Shell CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: ShellCheck maintained scripts
        run: tools/ci/shellcheck.sh

  rules:
    name: Rules TOML CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install toml
        run: pip3 install --user toml

      - name: Validate mtsp-rules TOML
        run: python3 tools/ci/validate-rules-toml.py

  docs:
    name: Doc Freshness CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Check doc freshness (warn-only)
        run: python3 tools/ci/check-doc-freshness.py

  backend-contract:
    name: Backend Contract CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate versioned Electron/backend contract
        run: python3 tools/contracts/validate-electron-backend-contract.py

  metal:
    name: Metal CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure
        run: cmake -S . -B build-metal -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-metal --parallel $(sysctl -n hw.ncpu)

      - name: Metal tests
        run: ctest --test-dir build-metal --output-on-failure -R '^(metal_device|dxbc|format_translation|phase17)$'

  vue:
    name: Vue CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome
        run: npx @biomejs/biome ci src/renderer

      - name: Prettier
        run: npx prettier --check 'src/renderer/**/*.{ts,js,html,css,json}'

      - name: Build renderer
        run: npx vite build

  c-backend:
    name: C Backend CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build and test committed C backend
        run: make -C app/src-c verify

      - name: Sign with EndpointSecurity entitlements
        run: |
          codesign --force --sign - \
            --entitlements app/src-rust/entitlements.plist \
            app/build/c-backend/metalsharp-backend

  electron:
    name: Electron CI
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Electron/C backend bindings
        run: python3 ../tools/contracts/validate-electron-c-backend-bindings.py

      - name: Biome
        run: npx @biomejs/biome ci src/main src/shared

      - name: Prettier
        run: npx prettier --check 'src/main/**/*.{ts,js,json}' 'src/shared/**/*.{ts,js,json}'

  dmg-workflow:
    name: DMG Workflow CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify DMG workflow contract
        run: python3 tools/ci/verify-dmg-workflow.py

  native:
    name: C/C++/Obj-C CI
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install clang-format
        run: brew install clang-format zstd

      - name: D3D12 Metal SDK contracts
        run: |
          prepare_d3d12_mini_probe_runtime() {
            mkdir -p app/bundles "$HOME/.metalsharp/runtime/wine/lib/dxmt"
            for asset in metalsharp-runtime.tar.zst metalsharp-graphics-dll.tar.zst; do
              if [ ! -s "app/bundles/$asset" ]; then
                curl -fL -o "app/bundles/$asset" "https://github.com/aaf2tbz/metalsharp/releases/download/bundles/$asset"
              fi
            done

            tools/bundles/verify-bundles.sh --bundle-dir app/bundles \
              metalsharp-runtime.tar.zst \
              metalsharp-graphics-dll.tar.zst

            tmp_bundle="$(mktemp -d)"
            tar --use-compress-program=unzstd -xf app/bundles/metalsharp-runtime.tar.zst -C "$tmp_bundle"
            wine_source="$tmp_bundle/runtime/wine"
            mkdir -p "$HOME/.metalsharp/runtime/wine"
            cp -R "$wine_source"/. "$HOME/.metalsharp/runtime/wine/"

            tmp_dxmt="$(mktemp -d)"
            tar --use-compress-program=unzstd -xf app/bundles/metalsharp-graphics-dll.tar.zst -C "$tmp_dxmt"
            mkdir -p "$HOME/.metalsharp/runtime/wine/lib/dxmt"
            mkdir -p "$HOME/.metalsharp/runtime/wine/lib/dxmt_m12"
            cp -R "$tmp_dxmt/Graphics/dll/dxmt"/. "$HOME/.metalsharp/runtime/wine/lib/dxmt/"
            cp -R "$tmp_dxmt/Graphics/dll/dxmt-m12"/. "$HOME/.metalsharp/runtime/wine/lib/dxmt_m12/"
          }

          python3 tools/d3d12-metal-sdk/scripts/validate-contracts.py
          python3 tools/d3d12-metal-sdk/scripts/validate-probe-matrix.py
          if ! git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > /tmp/metalsharp-pr-files.txt; then
            echo "Unable to diff PR files from the current checkout; assuming D3D12 Metal SDK touch."
            echo "tools/d3d12-metal-sdk" > /tmp/metalsharp-pr-files.txt
          fi
          if grep -E '^(vendor/dxmt/src/d3d12|vendor/dxmt/src/airconv|vendor/dxmt/src/winemetal|tools/d3d12-metal-sdk)/' /tmp/metalsharp-pr-files.txt >/dev/null; then
            echo "D3D12 Metal SDK touch detected; running required mini-probe gate."
            prepare_d3d12_mini_probe_runtime
            tools/d3d12-metal-sdk/scripts/run-probes.sh --profile metalsharp --mini-only
          fi

      - name: Format check
        run: find src include tests tools \( -name '*.c' -o -name '*.cpp' -o -name '*.h' -o -name '*.mm' \) -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Configure
        run: cmake -S . -B build-native -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build-native --parallel $(sysctl -n hw.ncpu)

      - name: Runtime tests
        run: ctest --test-dir build-native --output-on-failure -E '^(metal_device|dxbc|format_translation|phase17)$'

      - name: Host ABI package smoke
        run: |
          METALSHARP_BUILD_DIR="$PWD/build-native" tools/package/create-host-runtime.sh
          test -s app/native/host/HostRuntimeABI.h
          test -s app/native/host/manifest.json
          test -s app/native/host/libmetalsharp_host_runtime.dylib
