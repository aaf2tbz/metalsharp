name: Bug Report
description: Report a bug or crash in MetalSharp
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.

  - type: input
    id: game
    attributes:
      label: Game
      description: Which game were you playing?
      placeholder: e.g. Rain World, Portal 2, Terraria
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MetalSharp Version
      description: What version are you running?
      placeholder: e.g. 0.19.0
    validations:
      required: true

  - type: dropdown
    id: launch-method
    attributes:
      label: Launch Method
      description: How was the game launched?
      options:
        - Native (DXMT Metal)
        - Native (D3DMetal/GPTK)
        - Native (MetalFX)
        - FNA (ARM64)
        - FNA (x86)
        - WineD3D (32-bit)
        - MetalSharp Wine
        - Steam bare
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Launch game via...
        2. Play until...
        3. Observe...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste crash logs or MetalSharp backend logs.
        Log location: `~/.metalsharp/logs/`
        Crash reports: `~/Library/Logs/DiagnosticReports/metalsharp-backend*.ips`
      render: shell
    validations:
      required: false

  - type: input
    id: hardware
    attributes:
      label: Mac model / chip
      placeholder: e.g. MacBook Pro M4 Pro, Mac Mini M2
    validations:
      required: false

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. Sequoia 15.4
    validations:
      required: false

  - type: textarea
    id: external-drives
    attributes:
      label: External drive info
      description: If the game is installed on an external drive, what format and connection?
      placeholder: e.g. SSD via USB-C, APFS format, mounted at /Volumes/MySSD
    validations:
      required: false
