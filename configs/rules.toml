# ── Fallback Detection ────────────────────────────────────────────────
# Games not in rules.toml are detected by file heuristics:
#   unityplayer.dll / gameassembly.dll → steam_d3dmetal_perf
#   engine/ + binaries/ → steam_metalfx (Unreal)
#   *.pak / engine/ + content/ → steam_metalfx (Unreal)
#   *.bdt / *.bhd → steam_metalfx (Denuvo)
#   re_chunk_* / re2_config.ini / re8_config.ini → steam_d3dmetal_perf (RE Engine)
#   d3dx9_43.dll → metalsharp_wine
#   steam_api64.dll / steam_api.dll → steam_d3dmetal_perf
#   *.dll with _data/Managed/ (no native PE) → fna_arm64
#   otherwise → steam_d3dmetal_perf
