# MetalSharp Game Rules — defines how each game is prepared and launched
# Rules are matched by appid. Fallback detection uses file heuristics.
# User overrides: ~/.metalsharp/configs/rules.toml (takes precedence)

[global]
default_method = "steam_d3dmetal_perf"
default_prefix = "steam"

# ── FNA/XNA Games (Mono Runtime) ──────────────────────────────────────

[[game]]
appid = 105600
name = "Terraria"
engine = "fna_arm64"
method = "xna_fna_arm64"
setup = "fna_terrarria"
exe = "TerrariaLauncher.exe"
prefix = "steam"
notes = "arm64 mono + FAudio, no Wine needed"

[game.env]
FNA3D_DRIVER = "OpenGL"
MONO_CONFIG = "terraria-mono.config"

[[game]]
appid = 504230
name = "Celeste"
engine = "fna_x86"
method = "xna_fna_x86"
setup = "fna_celeste"
exe = "Celeste.exe"
prefix = "steam"
notes = "x86_64 mono via Rosetta + FMOD 1.10"

[game.env]
FNA3D_DRIVER = "OpenGL"
METAL_DEVICE_WRAPPER_TYPE = "0"

# ── GPTK (Apple Game Porting Toolkit) ────────────────────────────────

[[game]]
appid = 312520
name = "Rain World"
engine = "gptk_wine"
method = "gptk_wine"
setup = "gptk_prefix"
prefix = "gptk"
notes = "Requires GPTK Wine, uses GPTK D3D11→Metal"

[[game]]
appid = 375520
name = "Rain World (Alt)"
engine = "gptk_wine"
method = "gptk_wine"
setup = "gptk_prefix"
prefix = "gptk"
notes = "Alternate Rain World appid"

# ── MetalSharp Wine + DXMT ────────────────────────────────────────────

[[game]]
appid = 535520
name = "Nidhogg 2"
engine = "metalsharp_wine"
method = "metalsharp_wine"
setup = "dxmt_system_swap"
prefix = "steam"
notes = "DXMT DLLs swapped into system dir (not game dir)"

[[game]]
appid = 391540
name = "Hotline Miami 2"
engine = "metalsharp_wine"
method = "metalsharp_wine"
setup = "none"
prefix = "steam"

# ── Steam Direct Launch ───────────────────────────────────────────────

[[game]]
appid = 945360
name = "Among Us"
engine = "steam_bare"
method = "steam"
setup = "remove_dxmt_from_game_dir"
prefix = "steam"
notes = "DXMT DLLs must NOT be in game dir"

[[game]]
appid = 1139900
name = "Among Us (Alt)"
engine = "steam_bare"
method = "steam"
setup = "remove_dxmt_from_game_dir"
prefix = "steam"

# ── D3DMetal (Apple D3D12→Metal) ──────────────────────────────────────

[[game]]
appid = 2050650
name = "Resident Evil 4"
engine = "d3dmetal_wine"
method = "d3dmetal_wine"
setup = "none"
prefix = "steam"
status = "d3d12_incomplete"
notes = "D3DMetal D3D12 incomplete — black screen. Needs our own D3D12→Metal layer."

[game.env]
MS_BACKEND = "d3dmetal"
WINEDEBUG = "-all"

