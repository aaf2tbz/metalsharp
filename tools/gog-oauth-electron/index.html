<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: #1c1c1e; }
    #header { display: flex; align-items: center; background: #2c2c2e; padding: 6px 10px; border-bottom: 1px solid #3a3a3c; gap: 6px; flex-shrink: 0; }
    .nav-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px 10px; border-radius: 6px; color: #8e8e93; }
    .nav-btn:hover { background: #3a3a3c; color: #fff; }
    .nav-btn:disabled { color: #48484a; cursor: default; }
    #url-bar { flex: 1; padding: 5px 12px; border-radius: 8px; border: 1px solid #48484a; background: #1c1c1e; font-size: 13px; color: #f5f5f7; outline: none; font-family: inherit; }
    #url-bar:focus { border-color: #0a84ff; }
    webview { flex: 1; width: 100%; height: 100%; background: #fff; border: none; }
  </style>
</head>
<body>
  <div id="header">
    <button class="nav-btn" id="back-btn" disabled title="Back">←</button>
    <button class="nav-btn" id="forward-btn" disabled title="Forward">→</button>
    <button class="nav-btn" id="reload-btn" title="Reload">↻</button>
    <input type="text" id="url-bar" autocomplete="off" spellcheck="false" readonly>
  </div>
  <webview id="browser-view" allowpopups></webview>
  <script>
    const { ipcRenderer } = require("electron");
    const webview = document.getElementById("browser-view");
    const urlBar = document.getElementById("url-bar");
    const backBtn = document.getElementById("back-btn");
    const forwardBtn = document.getElementById("forward-btn");
    const reloadBtn = document.getElementById("reload-btn");

    const GOG_CALLBACK_HOST = "embed.gog.com";

    function checkCallback(url) {
      try {
        const u = new URL(url);
        if (u.hostname !== GOG_CALLBACK_HOST) return;
        const code = u.searchParams.get("code");
        const err = u.searchParams.get("error") ?? u.searchParams.get("error_description");
        if (err) { ipcRenderer.send("oauth-result", { error: err }); return; }
        if (code) { ipcRenderer.send("oauth-result", { code }); return; }
      } catch {}
    }

    function updateUI() {
      const url = webview.getURL();
      if (url) {
        urlBar.value = url;
        checkCallback(url);
      }
      backBtn.disabled = !webview.canGoBack();
      forwardBtn.disabled = !webview.canGoForward();
    }

    webview.addEventListener("did-navigate", updateUI);
    webview.addEventListener("did-navigate-in-page", updateUI);
    webview.addEventListener("dom-ready", () => {
      webview.setUserAgent("Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/200.0");
      updateUI();
    });

    // Intercept popup windows (Steam/Google/Discord OAuth).
    // With allowpopups, child windows open within the webview process.
    // Monitor them for the callback URL.
    webview.addEventListener("new-window", (e) => {
      if (e.url) {
        // Try loading in the same webview first. If it doesn't work, the
        // popup will still open via allowpopups and did-create-window catches it.
        webview.loadURL(e.url);
        e.preventDefault();
      }
    });

    webview.addEventListener("did-create-window", (e) => {
      const childWin = e.window;
      if (!childWin) return;
      // Monitor the child popup window for the callback URL.
      childWin.webContents.on("did-navigate", (_navEvent, url) => {
        urlBar.value = url;
        if (checkCallback(url)) {
          try { childWin.close(); } catch {}
        }
      });
    });

    urlBar.addEventListener("click", () => urlBar.select());
    backBtn.addEventListener("click", () => { if (webview.canGoBack()) webview.goBack(); });
    forwardBtn.addEventListener("click", () => { if (webview.canGoForward()) webview.goForward(); });
    reloadBtn.addEventListener("click", () => webview.reload());

    // Read the GOG auth URL from the query string.
    const params = new URLSearchParams(window.location.search);
    const authUrl = params.get("auth");
    if (authUrl) {
      webview.src = authUrl;
    }

    // IPC fallback (main process can also send load-url).
    ipcRenderer.on("load-url", (_e, url) => {
      webview.loadURL(url);
    });
  </script>
</body>
</html>
