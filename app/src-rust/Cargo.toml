[package]
name = "metalsharp-backend"
version = "0.33.27"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tiny_http = "0.12"
dirs = "6"
walkdir = "2"
zstd = "0.13"
ureq = { version = "3", features = ["json"] }
toml = "1.1"
rusqlite = { version = "0.31", features = ["bundled"] }
ctrlc = "3"
